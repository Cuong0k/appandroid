name: Release APK

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle (generates missing gradle-wrapper.jar)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Download libv2ray.aar
        run: |
          mkdir -p app/libs
          RELEASE_JSON=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/2dust/v2rayNG/releases/latest")
          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | python3 -c "
import sys, json
data = json.loads(sys.stdin.read())
for a in data.get('assets', []):
    if 'libv2ray' in a['name'] and a['name'].endswith('.aar'):
        print(a['browser_download_url']); break
")
          if [ -n "$DOWNLOAD_URL" ]; then
            curl -fsSL -L "$DOWNLOAD_URL" -o app/libs/libv2ray.aar
          fi

      - name: Get version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          VERSION_NAME="${VERSION#v}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
          CODE=$(( MAJOR * 10000 + MINOR * 100 + ${PATCH:-0} ))
          echo "VERSION_CODE=$CODE" >> $GITHUB_OUTPUT

      - name: Update version in build.gradle.kts
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ steps.version.outputs.VERSION_CODE }}/" app/build.gradle.kts
          sed -i 's/versionName = "[^"]*"/versionName = "${{ steps.version.outputs.VERSION_NAME }}"/' app/build.gradle.kts

      - name: Decode Keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"
          SIGNING_KEYSTORE_PATH: ${{ github.workspace }}/app/release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
             "VpnApp-${{ steps.version.outputs.VERSION }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VPN App ${{ steps.version.outputs.VERSION }}"
          body: |
            ## VPN App ${{ steps.version.outputs.VERSION }}

            ### Cài đặt
            1. Tải file APK bên dưới
            2. Bật **Cài đặt từ nguồn không rõ** trên Android
            3. Mở file APK và cài đặt

            ### Yêu cầu
            - Android 5.0+ (API 21)
          files: VpnApp-${{ steps.version.outputs.VERSION }}.apk
