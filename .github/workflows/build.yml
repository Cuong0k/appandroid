name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug / release)'
        required: false
        default: 'debug'
        type: choice
        options: [ debug, release ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. JDK 17 ────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle wrapper JAR ─────────────────────────────────────────
      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      # ── 4. libv2ray.aar (VPN engine) ──────────────────────────────────
      - name: Download libv2ray.aar
        run: |
          mkdir -p app/libs
          echo "Fetching latest V2RayNG release..."
          RELEASE_JSON=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/2dust/v2rayNG/releases/latest")

          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assets = data.get('assets', [])
          for a in assets:
              if 'libv2ray' in a['name'] and a['name'].endswith('.aar'):
                  print(a['browser_download_url'])
                  break
          " 2>/dev/null)

          if [ -z "$DOWNLOAD_URL" ]; then
            echo "ERROR: libv2ray.aar not found in V2RayNG releases"
            exit 1
          fi

          echo "Downloading: $DOWNLOAD_URL"
          curl -fsSL "$DOWNLOAD_URL" -o app/libs/libv2ray.aar
          echo "libv2ray.aar downloaded: $(du -sh app/libs/libv2ray.aar | cut -f1)"

      # ── 5. Gradle cache ───────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 6. Build DEBUG APK ────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"

      # ── 7. Upload debug APK ───────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VpnApp-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      # ── 8. Build RELEASE APK (nếu có keystore) ────────────────────────
      - name: Decode Keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks

      - name: Build Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: ./gradlew assembleRelease --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"
          SIGNING_KEYSTORE_PATH: ${{ github.workspace }}/app/release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: VpnApp-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      # ── 9. In thông tin APK ───────────────────────────────────────────
      - name: APK Info
        if: always()
        run: |
          echo "=== Build Output ==="
          find app/build/outputs/apk -name "*.apk" 2>/dev/null | while read f; do
            SIZE=$(du -sh "$f" | cut -f1)
            echo "  $f ($SIZE)"
          done || echo "No APK found"
