name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle (generates missing gradle-wrapper.jar)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"
          cache-read-only: false

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Download libv2ray.aar
        run: |
          mkdir -p app/libs
          echo "Fetching V2RayNG latest release..."
          RELEASE_JSON=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/2dust/v2rayNG/releases/latest")

          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | python3 -c "
import sys, json
data = json.loads(sys.stdin.read())
for a in data.get('assets', []):
    if 'libv2ray' in a['name'] and a['name'].endswith('.aar'):
        print(a['browser_download_url']); break
")

          if [ -z "$DOWNLOAD_URL" ]; then
            echo "Warning: libv2ray.aar not found in release assets"
            echo "Available assets:"
            echo "$RELEASE_JSON" | python3 -c "
import sys, json
data = json.loads(sys.stdin.read())
for a in data.get('assets', []):
    print(' -', a['name'])
"
          else
            echo "Downloading: $DOWNLOAD_URL"
            curl -fsSL -L "$DOWNLOAD_URL" -o app/libs/libv2ray.aar
            echo "Size: $(du -sh app/libs/libv2ray.aar)"
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g -Xms512m"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VpnApp-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Build Summary
        if: always()
        run: |
          echo "### Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if find app/build/outputs/apk -name "*.apk" 2>/dev/null | grep -q .; then
            find app/build/outputs/apk -name "*.apk" | while read f; do
              echo "- **$(basename $f)** ($(du -sh "$f" | cut -f1))" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "No APK produced" >> $GITHUB_STEP_SUMMARY
          fi
