name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper JAR
        run: |
          GRADLE_VER="8.5"
          echo "==> Downloading Gradle ${GRADLE_VER}..."
          curl -fsSL \
            "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" \
            -o /tmp/gradle.zip
          echo "==> Extracting..."
          unzip -q /tmp/gradle.zip -d /tmp/gradle_dist/

          echo "==> Generating wrapper using minimal temp project..."
          mkdir -p /tmp/tmpproject
          echo 'rootProject.name = "tmp"' > /tmp/tmpproject/settings.gradle
          /tmp/gradle_dist/gradle-${GRADLE_VER}/bin/gradle \
            wrapper \
            --gradle-version "${GRADLE_VER}" \
            --distribution-type bin \
            --project-dir /tmp/tmpproject

          echo "==> Copying wrapper JAR to project..."
          cp /tmp/tmpproject/gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          echo "==> Wrapper ready:"
          ls -lh gradle/wrapper/

      - name: Download libv2ray.aar
        run: |
          mkdir -p app/libs
          DOWNLOAD_URL=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/2dust/v2rayNG/releases/latest" \
            | jq -r '.assets[] | select((.name | contains("libv2ray")) and (.name | endswith(".aar"))) | .browser_download_url' \
            | head -1)
          if [ -n "$DOWNLOAD_URL" ]; then
            echo "Downloading: $DOWNLOAD_URL"
            curl -fsSL -L "$DOWNLOAD_URL" -o app/libs/libv2ray.aar
            echo "Size: $(du -sh app/libs/libv2ray.aar)"
          else
            echo "WARNING: libv2ray.aar not found in latest V2RayNG release"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/gradle.log
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Show build errors
        if: failure()
        run: |
          echo "====== FIRST 150 LINES ======"
          head -150 /tmp/gradle.log
          echo ""
          echo "====== ERROR LINES ======"
          grep -n "error:\|FAILED\|Exception\|Could not\|Unresolved\|e:" /tmp/gradle.log | head -40 || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VpnApp-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Build Summary
        if: always()
        run: |
          echo "### Build Results" >> $GITHUB_STEP_SUMMARY
          if find app/build/outputs/apk -name "*.apk" 2>/dev/null | grep -q .; then
            find app/build/outputs/apk -name "*.apk" | while read f; do
              echo "- **$(basename "$f")** ($(du -sh "$f" | cut -f1))" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "No APK produced" >> $GITHUB_STEP_SUMMARY
          fi
